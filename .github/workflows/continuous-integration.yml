name: Continuous Integration

on: push

env:
  ContinuousIntegrationBuild: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
  TERM: xterm

jobs:
  package:
    strategy:
      matrix:        
        os: [ ubuntu-latest, windows-latest ]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
    name: 🛠 Build, test and pack
    steps:
      - name: 🧑‍💻 Checkout git repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏎 Optimize Windows runner
        if: matrix.os == 'windows-latest'
        run: |
          echo "DOTNET_INSTALL_DIR=D:\dotnet" >> $env:GITHUB_ENV
          echo "NUGET_PACKAGES=D:\nuget" >> $env:GITHUB_ENV

      - name: 🧑‍🔧 Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: ℹ️ Show .NET info
        run: dotnet --info

      - name: 💾 Retrieve cached NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES || '~/.nuget/packages' }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: ⚙️ Restore dotnet tools
        run: dotnet tool restore

      - name: ⚙️ Restore NuGet packages
        run: dotnet restore

      - name: 🏗 Build solution
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Run tests
        run: dotnet test --no-build --configuration Release

      - name: 📤 Upload received files from failing tests
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: Received-${{ runner.os }}
          path: "**/*.received.*"

      - name: 📊 Test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test results (${{ runner.os }})
          path: 'TestResults/*.trx'
          reporter: dotnet-trx

      - name: 📦 Generate NuGet package
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack --no-build  --configuration Release --output .

      - name: ✅ Verify NuGet package
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet meziantou.validate-nuget-package *.nupkg

      - name: 📤 Upload NuGet package artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: NuGet package
          path: "*.nupkg"

      - name: 📝 Retrieve release notes from tag
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --tags --force
          git tag --list ${{ github.ref_name }} --format='%(contents)' > ReleaseNotes.md

      - name: 📤 Upload release notes
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v5
        with:
          name: Release Notes
          path: ReleaseNotes.md
  
  publish:
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    name: 🐿 Publish
    steps:
      - name: 📥 Download NuGet package artifact
        uses: actions/download-artifact@v5
        with:
          name: NuGet package

      - name: 📥 Download release notes artifact
        uses: actions/download-artifact@v5
        with:
          name: Release Notes

      - name: 🚢 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Version ${{ github.ref_name }}
          body_path: ReleaseNotes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: "*.nupkg"

      - name: 🔑 Retrieve NuGet API key
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: 'damien-braillard'

      - name: 🚀 Publish NuGet package on nuget.org
        run: dotnet nuget push "*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
